events {
    worker_connections 1024;
}

http {
    upstream hub_vegas {
        server hub-vegas:5001;
    }
    upstream hub_monaco {
        server hub-monaco:5001;
    }
    upstream hub_macau {
        server hub-macau:5001;
    }
    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;
    proxy_connect_timeout 10s;
    server {
        listen 80;
        location /ws/hub/Vegas {
            proxy_pass http://hub_vegas;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
        }
        location /ws/hub/Monaco {
            proxy_pass http://hub_monaco;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
        }
        location /ws/hub/Macau {
            proxy_pass http://hub_macau;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
        }
        location /switch/Vegas {
            proxy_pass         http://hub_vegas;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
        location /switch/Monaco {
            proxy_pass         http://hub_monaco;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
        location /switch/Macau {
            proxy_pass         http://hub_macau;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
        location / {
            proxy_pass         http://hub_vegas;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}